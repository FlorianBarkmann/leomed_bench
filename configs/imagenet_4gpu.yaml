data:
  dataset: "imagenet"
  data_root: "data/imagenet"
  batch_size: 64
  num_workers: 8
  image_size: 224

optimizer:
  lr: 0.001
  weight_decay: 0.05

runtime:
  seed: 42
  accelerator: "gpu"
  devices: 4
  num_nodes: 1
  strategy: "ddp"
  precision: "16-mixed"
  max_epochs: 100
  log_every_n_steps: 10
  benchmark: true
  deterministic: false
  output_dir: "outputs"
  run_name: "imagenet_4gpu"

model:
  name: "swin_t"
  num_classes: 1000
