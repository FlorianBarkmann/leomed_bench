data:
  data_root: "data"
  batch_size: 128
  num_workers: 8
  image_size: 224

optimizer:
  lr: 0.001
  weight_decay: 0.05

runtime:
  seed: 42
  accelerator: "gpu"
  devices: 4
  num_nodes: 1
  strategy: "ddp"
  precision: "16-mixed"
  max_epochs: 20
  log_every_n_steps: 10
  benchmark: true
  deterministic: false
  output_dir: "outputs"
  run_name: "cifar10_4gpu_ntask_1"

model:
  name: "swin_t"
  num_classes: 10
